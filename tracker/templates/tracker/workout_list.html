{% extends 'base.html' %}
{% block title %}Workouts{% endblock %}

{% block content %}
<h1>Workouts</h1>

<div style="margin-bottom: 1rem;">
    <a href="{% url 'workout_create' %}"
        style="padding: 0.5rem 1rem; background:#2563eb; color:white; text-decoration:none; border-radius:4px;">
        Nuevo workout
    </a>
</div>

{% if workouts %}
    <table style="width:100%; border-collapse:collapse;">
        <thead>
        <tr>
            <th style="text-align:left; border-bottom:1px solid #ddd; padding:0.5rem;">Fecha</th>
            <th style="text-align:left; border-bottom:1px solid #ddd; padding:0.5rem;">Tipo</th>
            <th style="text-align:right; border-bottom:1px solid #ddd; padding:0.5rem;">Distancia (km)</th>
            <th style="text-align:right; border-bottom:1px solid #ddd; padding:0.5rem;">Duración</th>
            <th style="text-align:center; border-bottom:1px solid #ddd; padding:0.5rem;">Acciones</th>
        </tr>
        </thead>
        <tbody>
        {% for w in workouts %}
            <tr>
                <td style="padding:0.5rem; border-bottom:1px solid #f0f0f0;">
                    <a href="{% url 'workout_detail' w.id %}">
                        {{ w.fecha }}
                    </a>
                </td>
                <td style="padding:0.5rem; border-bottom:1px solid #f0f0f0;">
                    {{ w.get_tipo_display }}
                </td>
                <td style="padding:0.5rem; border-bottom:1px solid #f0f0f0; text-align:right;">
                    {{ w.distancia_k
