{% extends 'base.html' %}
{% block title %}Workout{% endblock %}
{% block content %}
<h1>Workout</h1>
<form method="post">
    {% csrf_token %}
    {% for field in form %}
        <div>
            {{ field.label_tag }}
            {{ field }}
            {% for error in field.errors %}
                <p style="color:red;">{{ error }}</p>
            {% endfor %}
        </div>
    {% endfor %}
    <button type="submit">Guardar</button>
</form>
{% endblock %}
