{% extends 'base.html' %}
{% block title %}Estadísticas{% endblock %}
{% block content %}
<h1>Estadísticas</h1>

<canvas id="chart1"></canvas>
<canvas id="chart2"></canvas>
<canvas id="chart3"></canvas>
<canvas id="chart4"></canvas>
<canvas id="chart5"></canvas>

<script>
    const labels1 = {{ labels1|safe }};
    const data1 = {{ data1|safe }};
    const labels2 = {{ labels2|safe }};
    const data2 = {{ data2|safe }};
    const labels3 = {{ labels3|safe }};
    const data3 = {{ data3|safe }};
    const labels4 = {{ labels4|safe }};
    const data4 = {{ data4|safe }};
    const labels5 = {{ labels5|safe }};
    const data5 = {{ data5|safe }};

    const colors = [
        'rgba(54, 162, 235, 0.7)',
        'rgba(255, 99, 132, 0.7)',
        'rgba(255, 206, 86, 0.7)',
        'rgba(75, 192, 192, 0.7)',
        'rgba(153, 102, 255, 0.7)',
        'rgba(255, 159, 64, 0.7)',
    ];

    new Chart(document.getElementById('chart1'), {
        type: 'pie',
        data: {
            labels: labels1,
            datasets: [{
                data: data1,
                backgroundColor: colors,
            }]
        },
        options: {
            plugins: {
                title: {
                    display: true,
                    text: 'Distancia total por tipo'
                }
            }
        }
    });


    new Chart(document.getElementById('chart2'), {
        type: 'bar',
        data: {
            labels: labels2,
            datasets: [{
                label: 'Entrenos',
                data: data2,
                backgroundColor: colors[0],
            }]
        },
        options: {
            plugins: {
                title: {
                    display: true,
                    text: 'Entrenos por mes'
                }
            },
            scales: {
                y: { beginAtZero: true }
            }
        }
    });

    new Chart(document.getElementById('chart3'), {
        type: 'line',
        data: {
            labels: labels3,
            datasets: [{
                label: 'Horas',
                data: data3,
                borderColor: colors[1],
                backgroundColor: 'rgba(255, 99, 132, 0.2)',
                tension: 0.2,
                fill: true,
            }]
        },
        options: {
            plugins: {
                title: {
                    display: true,
                    text: 'Duración total por mes (h)'
                }
            },
            scales: {
                y: { beginAtZero: true }
            }
        }
    });

    
    new Chart(document.getElementById('chart4'), {
        type: 'doughnut',
        data: {
            labels: labels4,
            datasets: [{
                data: data4,
                backgroundColor: colors,
            }]
        },
        options: {
            plugins: {
                title: {
                    display: true,
                    text: 'FC media por tipo de entreno'
                }
            }
        }
    });

    
    new Chart(document.getElementById('chart5'), {
        type: 'bar',
        data: {
            labels: labels5,
            datasets: [{
                label: 'Calorías',
                data: data5,
                backgroundColor: colors[2],
            }]
        },
        options: {
            plugins: {
                title: {
                    display: true,
                    text: 'Calorías por mes'
                }
            },
            scales: {
                y: { beginAtZero: true }
            }
        }
    });
</script>
{% endblock %}
