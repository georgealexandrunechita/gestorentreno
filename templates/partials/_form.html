<form method="post">
    {% csrf_token %}
    {{ form.non_field_errors }}
    {% for field in form %}
        <div style="margin-bottom:0.75rem;">
            <label>{{ field.label }}:</label><br>
            {{ field }}
            {% if field.errors %}
                <div style="color:#dc2626; font-size:0.9rem;">
                    {{ field.errors|striptags }}
                </div>
            {% endif %}
            {% if field.help_text %}
                <div style="font-size:0.8rem; color:#6b7280;">
                    {{ field.help_text }}
                </div>
            {% endif %}
        </div>
    {% endfor %}
    <button type="submit"
            style="padding:0.5rem 1rem; background:#2563eb; color:white; border:none; border-radius:4px;">
        {{ submit_label|default:"Guardar" }}
    </button>
</form>
